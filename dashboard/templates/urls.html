<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>URLs</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

{% include 'navbar.html' %}

<div class="container mt-4">

    <div class="row mb-4">

        <div class="col">

            <h1>
                URL Inventory
            </h1>

            <p class="text-muted">
                Discovered URLs from GAU and WaybackURLs
            </p>

        </div>

    </div>

    <div class="card shadow-sm">

        <div class="card-header">

            <strong>
                URLs
            </strong>

        </div>

        <div class="card-body">

            {% if urls %}

            <div class="table-responsive">

                <table class="table table-striped table-hover">

                    <thead class="table-dark">

                        <tr>

                            <th>URL</th>

                            <th>Source</th>

                            <th>Discovered At</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for url in urls %}

                        <tr>

                            <td>

                                <a
                                    href="{{ url.url }}"
                                    target="_blank">

                                    {{ url.url }}

                                </a>

                            </td>

                            <td>

                                <span class="badge bg-primary">

                                    {{ url.source }}

                                </span>

                            </td>

                            <td>

                                {{ url.discovered_at }}

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

            {% else %}

            <div class="alert alert-warning">

                No URLs found.

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>

</html>
